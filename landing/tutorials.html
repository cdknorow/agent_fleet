<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorials — Coral by Subgentic.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg-primary: #0a0e14;
    --bg-surface: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2129;
    --border: #21262d;
    --border-light: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.container {
    max-width: 960px; margin: 0 auto;
    padding: 80px 24px 60px;
}
.back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 32px;
}
.back-link:hover { color: var(--text-primary); text-decoration: none; }
h1 {
    font-size: 32px; font-weight: 800; margin-bottom: 8px;
    letter-spacing: -0.02em;
}
.subtitle {
    font-size: 16px; color: var(--text-secondary); margin-bottom: 48px;
}
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 32px;
}
.video-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.video-card:hover {
    border-color: var(--border-light);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}
.video-embed {
    position: relative;
    padding-bottom: 62.5%;
    height: 0;
}
.video-embed iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
}
.video-info {
    padding: 16px 20px;
}
.video-info h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
}
.video-info p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
}
@media (max-width: 520px) {
    .video-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Coral
    </a>
    <h1>Tutorials</h1>
    <p class="subtitle">Learn how to get the most out of Coral with video walkthroughs.</p>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-embed">
                <iframe src="https://www.loom.com/embed/0b2509ba0c5c4dca907707241ef7330d" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Getting Started with Coral</h3>
            </div>
        </div>

        <div class="video-card">
            <div class="video-embed">
                <iframe src="https://www.loom.com/embed/fd1a639d95954268ba64396ad12126bf" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Coral Walkthrough</h3>
            </div>
        </div>
    </div>
</div>
</body>
</html>
