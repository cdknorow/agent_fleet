<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var t = 'dark';
            try { t = localStorage.getItem('coral-theme') || 'dark'; } catch(_) {}
            if (t === 'system') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral - Authentication</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .auth-logo {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }
        .auth-card h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .auth-card p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-family: monospace;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
            margin-bottom: 12px;
        }
        .auth-input:focus {
            border-color: var(--accent);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            background: var(--accent-dim);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .auth-btn:hover {
            background: var(--accent);
        }
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .auth-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .auth-hint {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="/static/favicon.png" alt="Coral" class="auth-logo">
        <h1>Coral</h1>
        <p>Enter your API key to connect. Find it in <code>~/.coral/api_key</code> or scan the QR code from the desktop app.</p>
        <form onsubmit="return submitKey(event)">
            <input type="text" id="key-input" class="auth-input" placeholder="Paste API key..." autocomplete="off" autofocus>
            <button type="submit" class="auth-btn" id="submit-btn">Connect</button>
        </form>
        <div class="auth-error" id="auth-error"></div>
        <p class="auth-hint">Connecting from localhost? No key needed — <a href="/" style="color:var(--accent)">go to dashboard</a></p>
    </div>

    <script>
        // Auto-submit if key is in URL query param
        (function() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');
            if (key) {
                document.getElementById('key-input').value = key;
                // Strip key from URL immediately
                history.replaceState(null, '', '/auth');
                // Auto-submit
                submitKey();
            }
        })();

        async function submitKey(e) {
            if (e) e.preventDefault();
            const key = document.getElementById('key-input').value.trim();
            const btn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('auth-error');

            if (!key) return false;

            btn.disabled = true;
            btn.textContent = 'Connecting...';
            errorEl.style.display = 'none';

            try {
                const resp = await fetch('/auth/key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key }),
                });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Invalid API key';
                    errorEl.style.display = 'block';
                }
            } catch {
                errorEl.textContent = 'Connection failed';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
            return false;
        }
    </script>
</body>
</html>
