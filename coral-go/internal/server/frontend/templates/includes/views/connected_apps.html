{{ define "includes/views/connected_apps.html" }}
<!-- Connected Apps View -->
<div id="connected-apps-view" class="ca-view" style="display:none">
    <div class="ca-header">
        <div class="ca-header-left">
            <h2>Connected Apps</h2>
            <span class="ca-header-hint">Connect external services for use in workflows</span>
        </div>
    </div>

    <!-- Existing connections -->
    <div id="ca-connections" class="ca-connections">
        <div class="ca-empty" id="ca-connections-empty" style="display:none">
            <span class="material-icons ca-empty-icon">link_off</span>
            <p>No connected apps yet</p>
            <span class="ca-empty-hint">Connect a service below to get started.</span>
        </div>
        <div id="ca-connections-list" class="ca-connections-list"></div>
    </div>

    <!-- Provider cards -->
    <div class="ca-providers-section">
        <h3 class="ca-section-title">Available Providers</h3>
        <div id="ca-providers" class="ca-providers"></div>
    </div>
</div>

<!-- Connect App Modal -->
<div id="ca-connect-modal" class="modal" style="display:none" onclick="if(event.target===this)hideConnectAppModal()">
    <div class="modal-content modal-content-extra-wide">
        <div class="modal-header">
            <h3 id="ca-modal-title">Connect App</h3>
            <button class="modal-close" onclick="hideConnectAppModal()">&times;</button>
        </div>
        <div class="modal-body ca-modal-body">
            <div id="ca-modal-instructions" class="ca-instructions"></div>

            <label class="ca-label">Connection Name</label>
            <input type="text" id="ca-input-name" class="ca-input" placeholder="e.g. Work Gmail">

            <!-- Credential fields (hidden when provider has embedded credentials) -->
            <div id="ca-credential-fields">
                <label class="ca-label">Client ID</label>
                <input type="text" id="ca-input-client-id" class="ca-input" placeholder="OAuth Client ID from provider console">

                <label class="ca-label">Client Secret</label>
                <input type="password" id="ca-input-client-secret" class="ca-input" placeholder="OAuth Client Secret">

                <div class="ca-callback-info">
                    <label class="ca-label">Callback URL <span class="ca-hint">(add this to your OAuth app settings)</span></label>
                    <div class="ca-callback-url" id="ca-callback-url"></div>
                </div>
            </div>

            <label class="ca-label">Scopes</label>
            <div id="ca-scopes-checkboxes" class="ca-scopes"></div>

            <div id="ca-modal-error" class="ca-modal-error" style="display:none"></div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="hideConnectAppModal()">Cancel</button>
            <button class="btn btn-primary" onclick="startOAuthFlow()">
                <span class="material-icons" style="font-size:16px">launch</span> Authorize
            </button>
        </div>
    </div>
</div>

{{ end }}
