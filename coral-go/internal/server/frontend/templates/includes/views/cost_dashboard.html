{{ define "includes/views/cost_dashboard.html" }}
<!-- Cost Dashboard View -->
<div id="cost-dashboard-view" class="cost-dashboard-view" style="display:none">
    <div class="cost-header">
        <div class="cost-header-left">
            <h2>Token Usage</h2>
        </div>
        <div class="cost-header-actions">
            <select id="cost-time-range" class="cost-time-select" onchange="window._costTimeRangeChanged()">
                <option value="1h">Last hour</option>
                <option value="24h" selected>Last 24 hours</option>
                <option value="7d">Last 7 days</option>
                <option value="30d">Last 30 days</option>
                <option value="all">All time</option>
            </select>
            <button class="btn btn-sm" onclick="window._refreshCostDashboard()">
                <span class="material-icons" style="font-size:16px">refresh</span> Refresh
            </button>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="cost-summary-cards" id="cost-summary-cards">
        <div class="cost-card">
            <div class="cost-card-label">Total Cost</div>
            <div class="cost-card-value" id="cost-total-cost">$0.00</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Total Tokens</div>
            <div class="cost-card-value" id="cost-total-tokens">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Input Tokens</div>
            <div class="cost-card-value" id="cost-input-tokens">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Output Tokens</div>
            <div class="cost-card-value" id="cost-output-tokens">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Sessions</div>
            <div class="cost-card-value" id="cost-num-sessions">0</div>
        </div>
    </div>

    <!-- By Agent Type -->
    <div class="cost-section">
        <h3 class="cost-section-title">By Agent Type</h3>
        <div id="cost-by-agent-type" class="cost-table-container">
            <div class="cost-empty">No usage data yet</div>
        </div>
    </div>

    <!-- Per-Session Breakdown -->
    <div class="cost-section">
        <h3 class="cost-section-title">Per Session</h3>
        <div id="cost-per-session" class="cost-table-container">
            <div class="cost-empty">No usage data yet</div>
        </div>
    </div>
</div>
{{ end }}
