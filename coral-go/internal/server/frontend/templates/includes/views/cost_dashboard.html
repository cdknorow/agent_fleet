{{ define "includes/views/cost_dashboard.html" }}
<!-- Token Usage Dashboard View -->
<div id="cost-dashboard-view" class="cost-dashboard-view" style="display:none">
    <div class="cost-header">
        <div class="cost-header-left">
            <h2>Token Usage</h2>
        </div>
        <div class="cost-header-actions">
            <select id="cost-time-range" class="cost-time-select" onchange="window._costTimeRangeChanged()">
                <option value="hour">Last hour</option>
                <option value="day" selected>Last 24 hours</option>
                <option value="week">Last 7 days</option>
                <option value="month">Last 30 days</option>
            </select>
            <button class="btn btn-sm" onclick="window._refreshCostDashboard()">
                <span class="material-icons" style="font-size:16px">refresh</span> Refresh
            </button>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="cost-summary-cards" id="cost-summary-cards">
        <div class="cost-card">
            <div class="cost-card-label">Input Tokens</div>
            <div class="cost-card-value" id="cost-input-tokens">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Output Tokens</div>
            <div class="cost-card-value" id="cost-output-tokens">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Cache Read</div>
            <div class="cost-card-value" id="cost-cache-read">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Cache Write</div>
            <div class="cost-card-value" id="cost-cache-write">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Requests</div>
            <div class="cost-card-value" id="cost-total-requests">0</div>
        </div>
        <div class="cost-card">
            <div class="cost-card-label">Total Cost</div>
            <div class="cost-card-value cost-card-value-muted" id="cost-total-cost">$0.00</div>
        </div>
    </div>

    <!-- By Model -->
    <div class="cost-section">
        <h3 class="cost-section-title">By Model</h3>
        <div id="cost-by-model" class="cost-table-container">
            <div class="cost-empty">No usage data yet</div>
        </div>
    </div>

    <!-- By Agent -->
    <div class="cost-section">
        <h3 class="cost-section-title">By Agent</h3>
        <div id="cost-by-agent" class="cost-table-container">
            <div class="cost-empty">No usage data yet</div>
        </div>
    </div>

    <!-- Request Log -->
    <div class="cost-section">
        <h3 class="cost-section-title">Request Log</h3>
        <div id="cost-request-log" class="cost-table-container">
            <div class="cost-empty">No requests yet</div>
        </div>
    </div>
</div>
{{ end }}
