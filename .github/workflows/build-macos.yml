name: Build macOS App

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tray]"
          pip install py2app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate .icns icon
        run: |
          ICON_PNG="src/coral/static/coral.png"
          ICONSET_DIR="Coral.iconset"
          mkdir -p "$ICONSET_DIR"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null
          done
          for size in 32 64 128 256 512 1024; do
            half=$((size / 2))
            sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${half}x${half}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET_DIR" -o Coral.icns
          rm -rf "$ICONSET_DIR"

      - name: Build Coral.app with py2app
        run: python setup_app.py py2app

      # ── Code Signing ──────────────────────────────────────────────
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Decode the certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security default-keychain -d user | tr -d '"' | xargs)"

          # Clean up certificate file
          rm -f certificate.p12

          # Store keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign Coral.app
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          APP="dist/Coral.app"
          ENTITLEMENTS="entitlements.plist"

          echo "Signing embedded libraries and frameworks..."

          # Sign all .so and .dylib files inside the app bundle (inside-out)
          find "$APP" -name '*.so' -o -name '*.dylib' | while read -r lib; do
            codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
              --entitlements "$ENTITLEMENTS" "$lib"
          done

          # Sign Python framework if bundled
          PYTHON_FW="$APP/Contents/Frameworks/Python.framework"
          if [ -d "$PYTHON_FW" ]; then
            echo "Signing Python.framework..."
            # Sign the Python binary inside the framework
            find "$PYTHON_FW" -type f -perm +111 -name 'Python*' | while read -r bin; do
              codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
                --entitlements "$ENTITLEMENTS" "$bin"
            done
            codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
              --entitlements "$ENTITLEMENTS" "$PYTHON_FW"
          fi

          # Sign the main app bundle
          echo "Signing Coral.app..."
          codesign --force --deep --options runtime --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" "$APP"

          # Verify the signature
          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "Signature verification passed."

      # ── DMG Creation ──────────────────────────────────────────────
      - name: Create DMG
        run: |
          create-dmg \
            --volname "Coral" \
            --volicon "Coral.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Coral.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Coral.dmg" \
            "dist/Coral.app"

      - name: Sign DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" "dist/Coral.dmg"
          codesign --verify --verbose "dist/Coral.dmg"
          echo "DMG signature verified."

      # ── Notarization ──────────────────────────────────────────────
      - name: Notarize DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "Submitting for notarization..."
          # Submit and capture the submission ID
          SUBMIT_OUT=$(xcrun notarytool submit "dist/Coral.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --output-format json)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Wait for notarization to complete
          echo "Waiting for notarization..."
          if ! xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --timeout 30m; then
            echo "::error::Notarization timed out or failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi

          # Fetch the log regardless to check for warnings
          echo "Fetching notarization log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" || true

          echo "Stapling notarization ticket..."
          xcrun stapler staple "dist/Coral.dmg"

          echo "Verifying notarization..."
          spctl --assess --type open --context context:primary-signature "dist/Coral.dmg" \
            && echo "Notarization verified." \
            || echo "Warning: spctl check failed (may need Gatekeeper test on real machine)"

      # ── Cleanup ───────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Upload ────────────────────────────────────────────────────
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coral-macOS
          path: dist/Coral.dmg

      - name: Upload DMG to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/Coral.dmg
