name: Build macOS App

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: coral-go/go.sum

      # ── Build Universal Binary ────────────────────────────────────
      - name: Build arm64 binary
        working-directory: coral-go
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w" \
            -o ../dist/coral-arm64 \
            ./cmd/coral/

      - name: Build amd64 binary
        working-directory: coral-go
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w" \
            -o ../dist/coral-amd64 \
            ./cmd/coral/

      - name: Create universal binary
        run: |
          lipo -create -output dist/coral dist/coral-arm64 dist/coral-amd64
          rm dist/coral-arm64 dist/coral-amd64

      # ── Generate Icon ─────────────────────────────────────────────
      - name: Generate .icns icon
        run: |
          ICON_PNG="coral-go/internal/server/frontend/static/coral.png"
          if [ -f "$ICON_PNG" ]; then
            ICONSET_DIR="Coral.iconset"
            mkdir -p "$ICONSET_DIR"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null
            done
            for size in 32 64 128 256 512 1024; do
              half=$((size / 2))
              sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${half}x${half}@2x.png" >/dev/null
            done
            iconutil -c icns "$ICONSET_DIR" -o Coral.icns
            rm -rf "$ICONSET_DIR"
          fi

      # ── Construct .app Bundle ─────────────────────────────────────
      - name: Create Coral.app bundle
        run: |
          APP="dist/Coral.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # Binary
          cp dist/coral "$APP/Contents/MacOS/coral"
          chmod +x "$APP/Contents/MacOS/coral"

          # Info.plist — substitute version from release tag or default
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" scripts/Info.plist > "$APP/Contents/Info.plist"

          # Icon
          if [ -f "Coral.icns" ]; then
            cp Coral.icns "$APP/Contents/Resources/AppIcon.icns"
          fi

          # Clean up standalone binary
          rm -f dist/coral

      # ── Code Signing ──────────────────────────────────────────────
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security import certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security default-keychain -d user | tr -d '"' | xargs)"

          rm -f certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign Coral.app
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          APP="dist/Coral.app"
          ENTITLEMENTS="entitlements.plist"

          # Sign the main binary
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" "$APP/Contents/MacOS/coral"

          # Sign the app bundle
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" "$APP"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "Signature verification passed."

      # ── DMG Creation ──────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VOLICON_ARGS=""
          if [ -f "Coral.icns" ]; then
            VOLICON_ARGS="--volicon Coral.icns"
          fi

          create-dmg \
            --volname "Coral" \
            ${VOLICON_ARGS} \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Coral.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Coral.dmg" \
            "dist/Coral.app"

      - name: Sign DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" "dist/Coral.dmg"
          codesign --verify --verbose "dist/Coral.dmg"
          echo "DMG signature verified."

      # ── Notarization ──────────────────────────────────────────────
      - name: Notarize DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "Submitting for notarization..."
          SUBMIT_OUT=$(xcrun notarytool submit "dist/Coral.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --output-format json)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          echo "Waiting for notarization..."
          if ! xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --timeout 30m; then
            echo "::error::Notarization timed out or failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi

          echo "Fetching notarization log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" || true

          echo "Stapling notarization ticket..."
          xcrun stapler staple "dist/Coral.dmg"

          echo "Verifying notarization..."
          spctl --assess --type open --context context:primary-signature "dist/Coral.dmg" \
            && echo "Notarization verified." \
            || echo "Warning: spctl check failed (may need Gatekeeper test on real machine)"

      # ── Cleanup ───────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Upload ────────────────────────────────────────────────────
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coral-macOS
          path: dist/Coral.dmg

      - name: Upload DMG to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/Coral.dmg
