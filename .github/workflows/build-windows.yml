name: Build Windows App

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: coral-go/go.sum

      # -- Build Go Binaries ------------------------------------------------
      - name: Build coral.exe
        working-directory: coral-go
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-s -w" -o ..\build\windows\bin\coral.exe ./cmd/coral/

      - name: Build launch-coral.exe
        working-directory: coral-go
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-s -w" -o ..\build\windows\bin\launch-coral.exe ./cmd/launch-coral/

      - name: Build coral-board.exe
        working-directory: coral-go
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-s -w" -o ..\build\windows\bin\coral-board.exe ./cmd/coral-board/

      # -- Code Signing (EXEs) ----------------------------------------------
      - name: Import signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV

      - name: Sign executables
        if: env.CERT_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          $binDir = "build\windows\bin"
          foreach ($exe in @("coral.exe", "launch-coral.exe", "coral-board.exe")) {
            $exePath = Join-Path $binDir $exe
            if (Test-Path $exePath) {
              & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
                /f $env:CERT_PATH /p $env:WINDOWS_CERTIFICATE_PWD `
                $exePath
              Write-Host "Signed $exe"
            }
          }

      # -- Build MSI with WiX -----------------------------------------------
      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          $version = "1.0.0"
          if ("${{ github.event.release.tag_name }}" -match "^v?(\d+\.\d+\.\d+)") {
            $version = $matches[1]
          }
          $binDir = (Resolve-Path "build\windows\bin").Path
          $buildDir = (Resolve-Path "build\windows").Path
          $msiPath = Join-Path $buildDir "Coral-$version-x64.msi"

          wix build scripts\coral.wxs `
            -d "Version=$version" `
            -d "BinDir=$binDir" `
            -d "BuildDir=$buildDir" `
            -o $msiPath

          echo "MSI_PATH=$msiPath" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Sign MSI
        if: env.CERT_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f $env:CERT_PATH /p $env:WINDOWS_CERTIFICATE_PWD `
            $env:MSI_PATH
          Write-Host "MSI signed"

      # -- Create Portable ZIP -----------------------------------------------
      - name: Create portable ZIP
        run: |
          $zipPath = "build\windows\Coral-$env:VERSION-x64-portable.zip"
          Compress-Archive -Path "build\windows\bin\*" -DestinationPath $zipPath
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      # -- Cleanup -----------------------------------------------------------
      - name: Cleanup certificate
        if: always() && env.CERT_PATH != ''
        run: Remove-Item $env:CERT_PATH -ErrorAction SilentlyContinue

      # -- Upload Artifacts --------------------------------------------------
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coral-Windows-MSI
          path: ${{ env.MSI_PATH }}

      - name: Upload portable ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coral-Windows-Portable
          path: ${{ env.ZIP_PATH }}

      - name: Upload assets to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" $env:MSI_PATH $env:ZIP_PATH
